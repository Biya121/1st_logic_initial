<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>싱가포르 1공정 대시보드</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --warn: #d29922;
      --err: #f85149;
      --pending: #484f58;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    header .badges { display: flex; gap: 8px; align-items: center; }
    .badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid;
    }
    .badge-ok    { color: var(--ok);   border-color: var(--ok); }
    .badge-warn  { color: var(--warn); border-color: var(--warn); }
    .badge-err   { color: var(--err);  border-color: var(--err); }
    .badge-muted { color: var(--muted);border-color: var(--border); }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr 320px;
      grid-template-rows: auto 1fr;
      height: calc(100vh - 45px);
      overflow: hidden;
    }

    /* ── Stat bar (full width top) ── */
    .statbar {
      grid-column: 1 / -1;
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .stat {
      flex: 1;
      padding: 10px 16px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat:last-child { border-right: none; }
    .stat .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .stat .value { font-size: 18px; font-weight: 700; }
    .stat .sub   { font-size: 10px; color: var(--muted); }

    /* ── Left: Controls ── */
    .controls {
      padding: 14px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 6px;
    }
    .btn {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #0d1117; }
    .btn-secondary { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
    .btn-success { background: var(--ok); color: #0d1117; }
    .btn-warn { background: var(--warn); color: #0d1117; }

    /* process steps */
    .process-steps { display: flex; flex-direction: column; gap: 4px; }
    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 11px;
    }
    .step .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--pending);
    }
    .step.running .dot { background: var(--accent); animation: pulse 1s infinite; }
    .step.done    .dot { background: var(--ok); }
    .step.error   .dot { background: var(--err); }
    .step.skipped .dot { background: var(--pending); }
    .step .step-name { font-weight: 600; flex: 1; }
    .step .step-status { color: var(--muted); font-size: 10px; }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .3; }
    }

    /* site grid */
    .site-grid { display: flex; flex-direction: column; gap: 3px; }
    .site-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 5px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 11px;
    }
    .site-dot {
      width: 7px; height: 7px;
      border-radius: 50%; flex-shrink: 0;
    }
    .site-dot.pending  { background: var(--pending); }
    .site-dot.running  { background: var(--accent); animation: pulse 1s infinite; }
    .site-dot.ok       { background: var(--ok); }
    .site-dot.warn     { background: var(--warn); }
    .site-dot.error    { background: var(--err); }
    .site-row .site-name { flex: 1; font-weight: 500; }
    .site-row .site-msg  { color: var(--muted); font-size: 10px; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Center: Products table ── */
    .center {
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid #1c2128; }
    tbody tr:hover { background: #1c2128; }
    tbody td { padding: 8px 10px; font-size: 12px; vertical-align: middle; }
    .pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
    }
    .pill-ok   { background: #0f3320; color: var(--ok); }
    .pill-warn { background: #2d1f07; color: var(--warn); }
    .pill-err  { background: #2d0f0f; color: var(--err); }
    .pill-muted{ background: #1c2128; color: var(--muted); }
    .conf-bar {
      width: 60px; height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
    }
    .conf-fill { height: 100%; border-radius: 3px; background: var(--accent); }

    /* ── Right: Log stream ── */
    .logpanel {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .log-header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-clear { cursor: pointer; color: var(--muted); font-size: 10px; }
    .log-clear:hover { color: var(--text); }
    #logbox {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 10.5px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .log-line {
      padding: 2px 6px;
      border-radius: 3px;
      line-height: 1.4;
      word-break: break-all;
    }
    .log-line.success { color: var(--ok); }
    .log-line.warn    { color: var(--warn); }
    .log-line.error   { color: var(--err); }
    .log-line.info    { color: var(--muted); }

    /* ── Analysis panel ── */
    .analysis-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .analysis-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .analysis-row:last-child { border-bottom: none; }
    .verdict-badge {
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .v-ok   { background: #0f3320; color: var(--ok); }
    .v-warn { background: #2d1f07; color: var(--warn); }
    .v-err  { background: #2d0f0f; color: var(--err); }

    /* responsive scroll hint */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1>🇸🇬 싱가포르 1공정 대시보드</h1>
  <div class="badges">
    <span class="badge badge-muted" id="hdr-status">대기 중</span>
    <span class="badge badge-muted" id="hdr-coverage">커버리지 —</span>
    <span class="badge badge-muted" id="hdr-conf">평균 conf —</span>
  </div>
</header>

<div class="layout">

  <!-- ── Stat bar ── -->
  <div class="statbar">
    <div class="stat">
      <div class="label">가격 수집</div>
      <div class="value" id="stat-price">0 / 8</div>
      <div class="sub">price_local (SGD)</div>
    </div>
    <div class="stat">
      <div class="label">분석 완료</div>
      <div class="value" id="stat-analysis">—</div>
      <div class="sub">Claude 분석</div>
    </div>
    <div class="stat">
      <div class="label">평균 Confidence</div>
      <div class="value" id="stat-conf">—</div>
      <div class="sub">IQR 이상치 제외</div>
    </div>
    <div class="stat">
      <div class="label">크롤 상태</div>
      <div class="value" id="stat-state" style="color:var(--muted)">대기</div>
      <div class="sub" id="stat-events">이벤트 0건</div>
    </div>
  </div>

  <!-- ── Left: Controls + Process ── -->
  <div class="controls">

    <div>
      <div class="section-title">크롤링</div>
      <div style="display:flex;gap:6px;flex-direction:column">
        <button class="btn btn-primary" id="btn-crawl" onclick="startCrawl(false)">
          ▶ 크롤 시작
        </button>
        <button class="btn btn-secondary" id="btn-crawl-ai" onclick="startCrawl(true)">
          ✦ AI 탐색 포함
        </button>
      </div>
    </div>

    <div>
      <div class="section-title">분석 · 보고서</div>
      <div style="display:flex;gap:6px;flex-direction:column">
        <button class="btn btn-warn" onclick="startAnalysis()">
          ⚡ 수출 적합성 분석
        </button>
        <button class="btn btn-success" onclick="generateReport()">
          📄 PDF 보고서 생성
        </button>
        <button class="btn btn-secondary" onclick="downloadReport()">
          ⬇ 최신 PDF 다운로드
        </button>
      </div>
    </div>

    <div>
      <div class="section-title">전체 프로세스</div>
      <div class="process-steps" id="process-steps">
        <div class="step" id="step-crawl">
          <div class="dot"></div>
          <div class="step-name">크롤링</div>
          <div class="step-status" id="step-crawl-s">대기</div>
        </div>
        <div class="step" id="step-db">
          <div class="dot"></div>
          <div class="step-name">DB 저장</div>
          <div class="step-status" id="step-db-s">대기</div>
        </div>
        <div class="step" id="step-analysis">
          <div class="dot"></div>
          <div class="step-name">Claude 분석</div>
          <div class="step-status" id="step-analysis-s">대기</div>
        </div>
        <div class="step" id="step-report">
          <div class="dot"></div>
          <div class="step-name">PDF 보고서</div>
          <div class="step-status" id="step-report-s">대기</div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">사이트별 상태</div>
      <div class="site-grid" id="site-grid">
        <div class="site-row"><div class="site-dot pending"></div><div class="site-name" style="color:var(--muted)">크롤 전</div></div>
      </div>
    </div>

  </div>

  <!-- ── Center: Products + Analysis ── -->
  <div class="center">

    <div>
      <div class="section-title" style="margin-bottom:8px">품목별 수집 현황</div>
      <table>
        <thead>
          <tr>
            <th>브랜드명</th>
            <th>INN</th>
            <th>현지가 (SGD)</th>
            <th>Confidence</th>
            <th>소스</th>
            <th>세그먼트</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="products-tbody">
          <tr><td colspan="7" style="color:var(--muted);text-align:center;padding:20px">크롤 전 — ▶ 크롤 시작을 눌러주세요</td></tr>
        </tbody>
      </table>
    </div>

    <div id="analysis-section" style="display:none">
      <div class="section-title" style="margin-bottom:8px">수출 적합성 분석</div>
      <div class="analysis-panel" id="analysis-panel"></div>
    </div>

  </div>

  <!-- ── Right: Log ── -->
  <div class="logpanel">
    <div class="log-header">
      <span>실시간 로그</span>
      <span class="log-clear" onclick="clearLog()">지우기</span>
    </div>
    <div id="logbox"></div>
  </div>

</div>

<script>
  // ── 상수 / 상태 ─────────────────────────────────────────────────────────────
  const INN = {
    SG_hydrine_hydroxyurea_500: 'Hydroxyurea 500mg',
    SG_gadvoa_gadobutrol_604:   'Gadobutrol 604mg',
    SG_sereterol_activair:      'Fluticasone/Salmeterol',
    SG_omethyl_omega3_2g:       'Omega-3 EE 2g',
    SG_rosumeg_combigel:        'Rosuvastatin+Omega-3',
    SG_atmeg_combigel:          'Atorvastatin+Omega-3',
    SG_ciloduo_cilosta_rosuva:  'Cilostazol+Rosuvastatin',
    SG_gastiin_cr_mosapride:    'Mosapride CR',
  };
  let _sse = null;
  let _analysisResult = null;

  // ── 로그 ─────────────────────────────────────────────────────────────────────
  function log(msg, level='info') {
    const box = document.getElementById('logbox');
    const line = document.createElement('div');
    line.className = `log-line ${level}`;
    const t = new Date().toLocaleTimeString('ko', {hour12:false});
    line.textContent = `${t}  ${msg}`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
    if (box.children.length > 400) box.removeChild(box.firstChild);
  }
  function clearLog() { document.getElementById('logbox').innerHTML = ''; }

  // ── 프로세스 스텝 ───────────────────────────────────────────────────────────
  function setStep(id, state, text) {
    const el = document.getElementById(`step-${id}`);
    if (!el) return;
    el.className = `step ${state}`;
    document.getElementById(`step-${id}-s`).textContent = text;
  }

  // ── 사이트 그리드 갱신 ───────────────────────────────────────────────────────
  async function refreshSites() {
    try {
      const res = await fetch('/api/sites');
      const sites = await res.json();
      const grid = document.getElementById('site-grid');
      grid.innerHTML = '';
      for (const s of sites) {
        const row = document.createElement('div');
        row.className = 'site-row';
        row.innerHTML = `<div class="site-dot ${s.status}"></div>
          <div class="site-name">${s.name}</div>
          <div class="site-msg" title="${s.message}">${s.message||'—'}</div>`;
        grid.appendChild(row);
      }
    } catch(e) {}
  }

  // ── 제품 테이블 갱신 ─────────────────────────────────────────────────────────
  async function refreshProducts() {
    try {
      const res = await fetch('/api/products');
      const rows = await res.json();
      const tbody = document.getElementById('products-tbody');
      if (!rows.length) return;

      let priceCount = 0, confSum = 0, confN = 0;
      tbody.innerHTML = '';

      const byPid = {};
      for (const r of rows) byPid[r.product_id] = r;

      const ORDER = Object.keys(INN);
      for (const pid of ORDER) {
        const r = byPid[pid];
        const tr = document.createElement('tr');
        if (!r) {
          tr.innerHTML = `<td>${pid.replace('SG_','').replace(/_/g,' ')}</td>
            <td style="color:var(--muted)">${INN[pid]||'—'}</td>
            <td colspan="5" style="color:var(--muted)">미수집</td>`;
        } else {
          const price = r.price_local != null ? `S$${r.price_local.toFixed(2)}` : '<span style="color:var(--muted)">—</span>';
          const conf  = r.confidence != null ? r.confidence : 0;
          const confPct = Math.round(conf * 100);
          const confColor = conf >= 0.8 ? 'var(--ok)' : conf >= 0.6 ? 'var(--warn)' : 'var(--err)';
          const seg = r.market_segment || '—';
          const src = (r.source_name||'—').replace('_',' ');
          const statusMap = {collected:'pill-ok', price_missing:'pill-warn', not_crawled:'pill-muted'};
          const statusLabel = {collected:'수집', price_missing:'가격없음', not_crawled:'미실행'};
          const st = r.price_local != null ? 'collected' : 'price_missing';

          tr.innerHTML = `
            <td><b>${r.trade_name||pid}</b></td>
            <td style="color:var(--muted)">${INN[pid]||r.scientific_name||'—'}</td>
            <td>${price}</td>
            <td>
              <div class="conf-bar"><div class="conf-fill" style="width:${confPct}%;background:${confColor}"></div></div>
              <span style="margin-left:4px;color:${confColor}">${conf.toFixed(2)}</span>
            </td>
            <td style="color:var(--muted)">${src}</td>
            <td style="color:var(--muted)">${seg}</td>
            <td><span class="pill ${statusMap[st]||'pill-muted'}">${statusLabel[st]||'—'}</span></td>`;

          if (r.price_local != null) priceCount++;
          if (r.confidence != null) { confSum += r.confidence; confN++; }
        }
        tbody.appendChild(tr);
      }

      document.getElementById('stat-price').textContent = `${priceCount} / 8`;
      document.getElementById('stat-conf').textContent  = confN ? (confSum/confN).toFixed(3) : '—';
      document.getElementById('hdr-coverage').textContent = `커버리지 ${Math.round(priceCount/8*100)}%`;
      document.getElementById('hdr-conf').textContent = confN ? `conf ${(confSum/confN).toFixed(3)}` : 'conf —';
    } catch(e) {}
  }

  // ── SSE 연결 ──────────────────────────────────────────────────────────────────
  function connectSSE() {
    if (_sse) { _sse.close(); }
    _sse = new EventSource('/api/stream');
    _sse.onmessage = (e) => {
      const ev = JSON.parse(e.data);
      const level = ev.level || 'info';
      const msg = ev.message || JSON.stringify(ev);
      log(`[${ev.phase||'?'}] ${msg}`, level);

      // 단계별 상태 반영
      const phase = ev.phase || '';
      if (phase.includes('crawl') || phase.includes('pipeline')) {
        setStep('crawl', level === 'error' ? 'error' : 'running', msg.slice(0,20)+'…');
      }
      if (phase.includes('db') || phase === 'upsert') {
        setStep('db', level === 'error' ? 'error' : 'done', '저장됨');
      }
    };
    _sse.onerror = () => log('SSE 연결 끊김 — 재연결 대기', 'warn');
  }

  // ── 상태 폴링 ────────────────────────────────────────────────────────────────
  async function pollStatus() {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      const el = document.getElementById('stat-state');
      el.textContent = d.running ? '실행 중' : '대기';
      el.style.color = d.running ? 'var(--accent)' : 'var(--muted)';
      document.getElementById('stat-events').textContent = `이벤트 ${d.event_count}건`;

      const hdr = document.getElementById('hdr-status');
      hdr.textContent = d.running ? '실행 중' : '대기 중';
      hdr.className = `badge ${d.running ? 'badge-ok' : 'badge-muted'}`;

      document.getElementById('btn-crawl').disabled = d.running;
      document.getElementById('btn-crawl-ai').disabled = d.running;

      if (!d.running) {
        setStep('crawl', 'done', '완료');
        setStep('db', 'done', '완료');
        refreshProducts();
        refreshSites();
      }
    } catch(e) {}
  }

  // ── 크롤 시작 ────────────────────────────────────────────────────────────────
  async function startCrawl(withAI) {
    setStep('crawl', 'running', '실행 중');
    setStep('db', 'running', '대기');
    log('크롤 요청 전송…', 'info');
    try {
      const res = await fetch('/api/run', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({use_ai_discovery: withAI}),
      });
      const d = await res.json();
      log(d.message || '크롤 시작됨', res.ok ? 'success' : 'error');
      if (res.ok) connectSSE();
    } catch(e) {
      log('크롤 요청 실패: ' + e, 'error');
      setStep('crawl', 'error', '실패');
    }
  }

  // ── 분석 시작 ────────────────────────────────────────────────────────────────
  async function startAnalysis() {
    setStep('analysis', 'running', '실행 중');
    log('Claude 분석 요청…', 'info');
    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({use_perplexity: false, force_refresh: true}),
      });
      const d = await res.json();
      log(d.message || '분석 시작', res.ok ? 'success' : 'error');
      if (res.ok) pollAnalysis();
    } catch(e) {
      log('분석 요청 실패: ' + e, 'error');
      setStep('analysis', 'error', '실패');
    }
  }

  async function pollAnalysis() {
    const res = await fetch('/api/analyze/status');
    const d = await res.json();
    if (d.running) {
      setTimeout(pollAnalysis, 2000);
    } else {
      const r2 = await fetch('/api/analyze/result');
      if (r2.ok) {
        const data = await r2.json();
        _analysisResult = data.results;
        renderAnalysis(_analysisResult);
        setStep('analysis', 'done', `${data.count}품목 완료`);
        document.getElementById('stat-analysis').textContent = data.count + ' / 8';
        log(`분석 완료 ${data.count}품목`, 'success');
      } else {
        setStep('analysis', 'error', '실패');
      }
    }
  }

  function renderAnalysis(results) {
    const sec = document.getElementById('analysis-section');
    const panel = document.getElementById('analysis-panel');
    sec.style.display = 'block';
    panel.innerHTML = '';

    let hasAnyRefs = results.some(r => (r.references||[]).length > 0);

    for (const r of results) {
      const vc = r.verdict === '적합' ? 'v-ok' : r.verdict === '부적합' ? 'v-err' : 'v-warn';
      const factors = (r.key_factors||[]).slice(0,3).join(' · ');
      const refs = r.references || [];

      // 논문 링크 HTML
      let refsHtml = '';
      if (refs.length > 0) {
        const links = refs.map(ref =>
          `<div style="margin-top:4px;display:flex;gap:6px;align-items:flex-start">
            <span style="color:var(--muted);flex-shrink:0">▸</span>
            <div>
              <a href="${ref.url}" target="_blank" rel="noopener"
                style="color:var(--accent);text-decoration:none;font-size:11px;line-height:1.4"
                onmouseover="this.style.textDecoration='underline'"
                onmouseout="this.style.textDecoration='none'"
              >${ref.title||ref.url}</a>
              <span style="color:var(--muted);font-size:10px;margin-left:4px">[${ref.source||''}]</span>
              <div style="color:var(--muted);font-size:10px;margin-top:1px">${ref.reason||''}</div>
            </div>
          </div>`
        ).join('');
        refsHtml = `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">${links}</div>`;
      } else if (!hasAnyRefs) {
        refsHtml = `<div style="margin-top:4px;font-size:10px;color:var(--pending)">
          PERPLEXITY_API_KEY 설정 시 관련 논문이 표시됩니다</div>`;
      }

      const row = document.createElement('div');
      row.className = 'analysis-row';
      row.style.flexDirection = 'column';
      row.style.alignItems = 'stretch';
      row.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px">
          <span class="verdict-badge ${vc}">${r.verdict}</span>
          <div style="flex:1">
            <div style="font-weight:600">${r.trade_name||r.product_id}</div>
            <div style="color:var(--muted);font-size:11px;margin-top:2px">${factors||r.confidence_note||''}</div>
          </div>
          <div style="font-size:10px;color:var(--muted)">${r.analysis_model||''}</div>
        </div>
        ${refsHtml}`;
      panel.appendChild(row);
    }

    if (hasAnyRefs) {
      log(`관련 논문 ${results.reduce((s,r)=>s+(r.references||[]).length,0)}건 로드됨`, 'success');
    }
  }

  // ── 보고서 ───────────────────────────────────────────────────────────────────
  async function generateReport() {
    setStep('report', 'running', '생성 중');
    log('PDF 보고서 생성 요청…', 'info');
    try {
      const res = await fetch('/api/report', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({run_analysis: false}),
      });
      const d = await res.json();
      log(d.message || '보고서 생성 시작', res.ok ? 'success' : 'error');
      if (res.ok) {
        setTimeout(async () => {
          const s = await fetch('/api/report/status');
          const sd = await s.json();
          if (sd.latest_pdf) {
            setStep('report', 'done', '완료');
            log('PDF 생성 완료 — 다운로드 가능', 'success');
          }
        }, 4000);
      }
    } catch(e) {
      log('보고서 생성 실패: ' + e, 'error');
      setStep('report', 'error', '실패');
    }
  }

  async function downloadReport() {
    log('PDF 다운로드…', 'info');
    window.location.href = '/api/report/download';
  }

  // ── 초기화 ───────────────────────────────────────────────────────────────────
  connectSSE();
  refreshSites();
  refreshProducts();
  setInterval(pollStatus, 3000);
  setInterval(refreshProducts, 8000);
  setInterval(refreshSites, 5000);
  log('대시보드 초기화 완료', 'info');
</script>
</body>
</html>
