# 1공정 크롤 정책 (라이브 HTTP 부하 제한)
# - max_live_http_requests_per_cycle: 사이클당 원격 HTTP(GET 등) 최대 횟수
#   (HSA CSV·GeBIZ CSV·DB는 여기 포함 안 함 — 로컬 파일 직접 읽기)
# - min_delay_seconds_between_live_requests: 라이브 요청 사이 최소 간격

max_live_http_requests_per_cycle: 8
min_delay_seconds_between_live_requests: 2.0

ndf:
  enabled: true

moh_pdf:
  enabled: true

api_light:
  moh_probe: true
  moh_probe_urls:
    - "https://www.moh.gov.sg/"
    - "https://www.moh.gov.sg/cost-financing/healthcare-schemes-subsidies/drug-subsidies-and-medication-costs"

dynamic_mid:
  live_fetch: true
  parse_price_from_html: false
  # omethyl_demo_price_sgd 제거 — 픽션 하드코딩 삭제

playwright_heavy:
  live_env: "PLAYWRIGHT_LIVE"
  http_probe_when_not_live: true

gebiz_weekly:
  live_env: "GEBIZ_LIVE"
  http_probe_when_not_live: true
  # GeBIZ 데이터는 datas/GovernmentProcurementviaGeBIZ.csv 로컬 파일 우선 사용
  local_csv: "datas/GovernmentProcurementviaGeBIZ.csv"
